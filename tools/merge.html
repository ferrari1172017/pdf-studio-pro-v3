<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unir PDF - Previsualización y Edición Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        .pdf-preview { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-radius: 8px; border: 1px solid #e5e7eb; transition: transform 0.2s;}
        .pdf-preview:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 h-screen flex flex-col font-sans">
    <nav class="bg-white shadow-sm p-4 flex justify-between items-center z-10">
        <a href="../index.html" class="text-lg font-bold text-gray-600 hover:text-red-600 transition"><i class="fas fa-arrow-left mr-2"></i> Inicio</a>
        <h1 class="text-2xl font-extrabold text-gray-800"><i class="fas fa-layer-group text-blue-500 mr-2"></i> Unir PDF</h1>
        <div class="text-sm font-semibold text-green-600 bg-green-50 px-3 py-1 rounded border border-green-200">100% Gratis</div>
    </nav>
    
    <div class="flex-grow flex flex-col md:flex-row p-4 md:p-6 gap-6 h-full overflow-hidden">
        
        <!-- VISUALIZADOR Y ÁREA DE TRABAJO -->
        <div class="flex-grow bg-white rounded-2xl shadow-sm border border-gray-200 p-6 flex flex-col relative overflow-y-auto" id="workspace">
            <div class="mb-6 flex justify-between items-end border-b pb-4">
                <div>
                    <h2 class="text-xl font-bold text-gray-800">Visualizador de Documentos</h2>
                    <p class="text-sm text-gray-500 mt-1">Sube tus archivos. Las páginas se previsualizarán aquí antes de unirlas.</p>
                </div>
                <label for="fileInput" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-4 rounded-lg cursor-pointer transition border border-gray-300">
                    <i class="fas fa-plus mr-1"></i> Añadir PDFs
                </label>
            </div>
            
            <input type="file" id="fileInput" multiple accept="application/pdf" class="hidden">
            
            <label for="fileInput" id="dropZone" class="border-2 border-dashed border-blue-400 bg-blue-50/50 text-blue-700 rounded-2xl p-10 md:p-16 text-center cursor-pointer hover:bg-blue-50 transition flex flex-col items-center justify-center my-auto mx-4 md:mx-10">
                <i class="fas fa-cloud-upload-alt text-6xl mb-4 text-blue-400"></i>
                <span class="text-2xl font-bold mb-2">Selecciona o arrastra tus archivos PDF aquí</span>
                <span class="text-gray-500 mt-2">Procesamiento local seguro. Los archivos no se suben a ningún servidor.</span>
            </label>

            <div id="previewContainer" class="flex flex-wrap gap-8 justify-start p-4">
                <!-- Las previsualizaciones de PDF.js aparecerán aquí -->
            </div>
        </div>

        <!-- PANEL LATERAL DE CONTROL -->
        <div class="w-full md:w-80 bg-white rounded-2xl shadow-sm border border-gray-200 p-6 flex flex-col shrink-0">
            <h3 class="font-bold text-xl mb-6 text-gray-800"><i class="fas fa-sliders-h mr-2 text-gray-500"></i> Ajustes</h3>
            
            <div class="bg-blue-50 p-4 rounded-lg border border-blue-100 mb-6">
                <p class="text-sm text-blue-800 font-medium">
                    <i class="fas fa-info-circle mr-1"></i> El sistema leerá los documentos cargados, los fusionará y generará un nuevo archivo nativo de inmediato.
                </p>
            </div>

            <div class="mb-4">
                <p class="text-sm font-semibold text-gray-600 mb-2">Archivos listos:</p>
                <div class="text-4xl font-black text-gray-800" id="fileCount">0</div>
            </div>

            <div class="mt-auto pt-6 border-t border-gray-100">
                <button id="processBtn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold text-lg py-4 px-4 rounded-xl shadow-lg transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center" disabled>
                    <i class="fas fa-magic mr-2"></i> Unir y Descargar
                </button>
                <div id="statusBox" class="mt-4 p-3 bg-green-50 border border-green-200 rounded-lg text-center hidden">
                    <p class="text-sm text-green-700 font-bold"><i class="fas fa-check-circle mr-1"></i> ¡Procesado y descargado!</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
    <script src="../js/merge.js"></script>
</body>
</html>
